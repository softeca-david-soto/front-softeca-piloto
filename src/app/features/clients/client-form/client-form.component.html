<div class="p-6 max-w-2xl mx-auto">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">
      {{ isEdit() ? 'Editar cliente' : 'Nuevo cliente' }}
    </h1>
    <button
      (click)="cancel()"
      class="text-gray-500 hover:text-gray-700 text-sm">
      ← Volver
    </button>
  </div>

  @if (error()) {
    <p class="text-red-500 mb-4">{{ error() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
      <input formControlName="name" type="text"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input formControlName="email" type="email"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
      <input formControlName="phone" type="text"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Código postal</label>
      <input formControlName="zipcode" type="text"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Provincia ID</label>
        <input formControlName="provincia_id" type="number"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Vendedor ID</label>
        <input formControlName="vendedor_id" type="number"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
      <select formControlName="tipo"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        @for (type of clientTypes; track type) {
          <option [value]="type">{{ type }}</option>
        }
      </select>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button type="button" (click)="cancel()"
        class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Cancelar
      </button>
      <button type="submit" [disabled]="form.invalid || loading()"
        class="px-4 py-2 text-sm text-white bg-blue-600 hover:bg-blue-700 rounded-lg disabled:opacity-50 transition-colors">
        {{ loading() ? 'Guardando...' : (isEdit() ? 'Guardar cambios' : 'Crear cliente') }}
      </button>
    </div>

  </form>
</div>
